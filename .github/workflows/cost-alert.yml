name: Render cost alert

# Runs every day at 08:00 UTC. Queries Render's billing endpoint for the
# current month's usage and opens a GitHub issue if it exceeds the threshold.
#
# Setup (one-time):
#   1. Render dashboard → Account Settings → API Keys → New API Key
#   2. GitHub repo → Settings → Secrets → Actions → add:
#        RENDER_API_KEY = rnd_...
#
# Without RENDER_API_KEY the job no-ops gracefully.

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  issues: write

env:
  THRESHOLD_USD: "5"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Gate on secret
        id: gate
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RENDER_API_KEY not set — skipping cost check."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Query Render usage
        if: steps.gate.outputs.enabled == 'true'
        id: cost
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          # Render exposes service-level usage; sum across services that aren't free.
          # We use the user-level invoice endpoint when available; fall back to 0.
          RAW=$(curl -sS "https://api.render.com/v1/owners?limit=10" \
            -H "Authorization: Bearer $RENDER_API_KEY" || echo "[]")
          OWNER_ID=$(echo "$RAW" | python -c "
          import json,sys
          d=json.load(sys.stdin)
          if d:
              o=d[0].get('owner',d[0])
              print(o.get('id',''))
          ")
          if [ -z "$OWNER_ID" ]; then
            echo "dollars=0" >> "$GITHUB_OUTPUT"
            echo "Could not resolve owner ID"
            exit 0
          fi
          # Try to get current invoice
          INV=$(curl -sS "https://api.render.com/v1/owners/$OWNER_ID/invoices?limit=1" \
            -H "Authorization: Bearer $RENDER_API_KEY" || echo "[]")
          DOLLARS=$(echo "$INV" | python -c "
          import json,sys
          d=json.load(sys.stdin)
          if d and len(d)>0:
              inv=d[0].get('invoice',d[0])
              cents=inv.get('amountDue',inv.get('total',0))
              print(f'{int(cents)/100:.2f}')
          else:
              print('0.00')
          ")
          echo "dollars=$DOLLARS" >> "$GITHUB_OUTPUT"
          echo "Current invoice: \$$DOLLARS"

      - name: Compare + alert
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/github-script@v7
        env:
          COST: ${{ steps.cost.outputs.dollars }}
          THRESHOLD: ${{ env.THRESHOLD_USD }}
        with:
          script: |
            const cost = parseFloat(process.env.COST);
            const threshold = parseFloat(process.env.THRESHOLD);
            if (!isFinite(cost) || cost < threshold) {
              core.info(`Current: $${cost.toFixed(2)} · threshold: $${threshold} — no alert`);
              return;
            }
            const title = `⚠️ Render invoice $${cost.toFixed(2)} — above $${threshold}`;
            const body = [
              `Render invoice has hit **$${cost.toFixed(2)}** (threshold $${threshold}).`,
              ``,
              `- Dashboard: https://dashboard.render.com/billing/`,
              `- To pause backend: \`curl -X POST -H "Authorization: Bearer $RENDER_API_KEY" https://api.render.com/v1/services/srv-d7lfagjeo5us73djcmqg/suspend\``,
              ``,
              `Auto-opened by \`.github/workflows/cost-alert.yml\`. Close to acknowledge.`,
            ].join("\n");
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "cost-alert",
              per_page: 1,
            });
            if (existing.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Still above threshold: $${cost.toFixed(2)}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ["cost-alert"],
            });
