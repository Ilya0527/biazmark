name: Fly cost alert

# Runs every day at 08:00 UTC (11:00 Israel time). Queries the Fly GraphQL API
# for the current upcoming invoice and opens a GitHub issue if it exceeds the
# threshold. No emails, no SMS — the GitHub issue shows up in your
# notifications on iOS/Android and is one click to acknowledge.
#
# Setup (one-time):
#   1. Create a deploy token:  fly tokens create deploy -x 999999h
#      Or in the dashboard: https://fly.io/user/personal_access_tokens
#   2. GitHub → repo Settings → Secrets and variables → Actions → New secret:
#        FLY_API_TOKEN = <paste>
#
# Dashboard: https://fly.io/dashboard/personal/billing

on:
  schedule:
    - cron: "0 8 * * *"   # daily 08:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write

env:
  # Open an issue if the upcoming invoice passes this. Tweak as you like.
  THRESHOLD_USD: "5"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Gate on secret
        id: gate
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FLY_API_TOKEN not set — skipping cost check. Add it in repo secrets to enable."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Query Fly invoice
        if: steps.gate.outputs.enabled == 'true'
        id: cost
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          QUERY='{"query":"query { viewer { ... on User { organizations { nodes { slug upcomingInvoice { total amountDue } } } } } }"}'
          RAW=$(curl -sS -X POST https://api.fly.io/graphql \
            -H "Authorization: Bearer $FLY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$QUERY")
          echo "raw=$RAW"
          # Pull the personal org total (in cents). Any org total over threshold triggers.
          TOTAL_CENTS=$(echo "$RAW" | python -c "
          import json,sys
          data=json.load(sys.stdin)
          orgs=((data.get('data') or {}).get('viewer') or {}).get('organizations', {}).get('nodes', [])
          total=0
          for o in orgs:
              inv=(o or {}).get('upcomingInvoice') or {}
              total += int(inv.get('amountDue') or inv.get('total') or 0)
          print(total)
          ")
          DOLLARS=$(python -c "print(f'{$TOTAL_CENTS/100:.2f}')")
          echo "dollars=$DOLLARS" >> "$GITHUB_OUTPUT"
          echo "Upcoming invoice: \$$DOLLARS"

      - name: Compare + alert
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/github-script@v7
        env:
          COST: ${{ steps.cost.outputs.dollars }}
          THRESHOLD: ${{ env.THRESHOLD_USD }}
        with:
          script: |
            const cost = parseFloat(process.env.COST);
            const threshold = parseFloat(process.env.THRESHOLD);
            if (!isFinite(cost)) {
              core.setFailed(`Could not parse cost: ${process.env.COST}`);
              return;
            }
            core.info(`Current: $${cost.toFixed(2)} · threshold: $${threshold}`);
            if (cost < threshold) return;

            const title = `⚠️ Fly upcoming invoice $${cost.toFixed(2)} — above $${threshold}`;
            const body = [
              `Upcoming Fly invoice has hit **$${cost.toFixed(2)}** (threshold $${threshold}).`,
              ``,
              `- Dashboard: https://fly.io/dashboard/personal/billing`,
              `- To pause the app: \`fly apps suspend biazmark-backend\``,
              `- To resume later: \`fly apps resume biazmark-backend\``,
              ``,
              `This issue was auto-opened by \`.github/workflows/cost-alert.yml\`. Close it to acknowledge.`,
            ].join("\n");

            // Don't spam — look for an open issue from a previous day first.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "cost-alert",
              per_page: 1,
            });
            if (existing.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Still above threshold: $${cost.toFixed(2)}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ["cost-alert"],
            });
