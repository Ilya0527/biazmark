<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.2" cy="0.3">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.85" cy="0.7">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#logo)"/>
    <text x="32" y="46" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="36" font-weight="800" fill="#ffffff" letter-spacing="-1">A</text>
    <text x="84" y="44" font-family="system-ui, -apple-system, sans-serif"
          font-size="34" font-weight="700" fill="#f1f5f9">AutoCMO</text>
  </g>

  <!-- Status pill -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="380" height="42" rx="21" fill="#ffffff" fill-opacity="0.06"
          stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="22" cy="21" r="5" fill="#34d399"/>
    <text x="40" y="27" font-family="system-ui, -apple-system, sans-serif"
          font-size="14" fill="#cbd5e1">Autonomous · Self-improving · Live</text>
  </g>

  <!-- Headline -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif"
        font-size="84" font-weight="800" fill="#f8fafc" letter-spacing="-2">Marketing that</text>
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif"
        font-size="84" font-weight="800" fill="url(#accent)" letter-spacing="-2">runs itself.</text>

  <!-- Subhead -->
  <text x="80" y="500" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" fill="#94a3b8">Brief in, campaigns out. Five AI agents handle every step —</text>
  <text x="80" y="528" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" fill="#94a3b8">research · strategy · content · publishing · optimization.</text>

  <!-- URL -->
  <text x="80" y="585" font-family="ui-monospace, SFMono-Regular, monospace"
        font-size="20" fill="#a78bfa">autocmo.app</text>
</svg>
